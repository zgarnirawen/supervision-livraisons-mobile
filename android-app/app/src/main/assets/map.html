<!DOCTYPE html>
<html>
<head>
    <title>Suivi Livraisons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html, #map { height: 100%; margin: 0; padding: 0; }
        .marker-label {
            background: white;
            border: 2px solid #6200EE;
            border-radius: 4px;
            padding: 2px 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([36.8065, 10.1815], 11); // Tunis par défaut
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var markers = {};

        function updateMarkers(locationsJson) {
            var locations = JSON.parse(locationsJson);
            var group = new L.featureGroup();

            locations.forEach(function(loc) {
                var latlng = [loc.latitude, loc.longitude];
                
                if (markers[loc.livreurId]) {
                    markers[loc.livreurId].setLatLng(latlng);
                } else {
                    var marker = L.marker(latlng).addTo(map)
                        .bindPopup("<b>" + loc.livreurNom + "</b><br>ID: " + loc.livreurId + "<br>Dernière maj: " + loc.capturedAt);
                    
                    markers[loc.livreurId] = marker;
                }
                group.addLayer(markers[loc.livreurId]);
            });

            if (locations.length > 0) {
                map.fitBounds(group.getBounds(), {padding: [50, 50]});
            }
        }
    </script>
</body>
</html>
