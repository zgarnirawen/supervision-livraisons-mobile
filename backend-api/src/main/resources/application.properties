# ============================================================
# APPLICATION CONFIGURATION - Supervision Livraisons API
# ============================================================

spring.application.name=supervision-livraisons-api
server.port=8080
server.address=0.0.0.0

# ============================================================
# POSTGRESQL DATABASE
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/livraisons_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt.secret=SuperSecretKeyForDeliverySupervision2026!ChangeInProduction
app.jwt.expiration=86400000

# ============================================================
# CORS (autoriser les requêtes Android/Emulateur)
# ============================================================
app.cors.allowed-origins=*

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# ============================================================
# LOGGING
# ============================================================
logging.level.com.supervision=DEBUG
logging.level.org.springframework.security=WARN
logging.file.name=logs/livraisons-api.log

# ============================================================
# S3 / MinIO (POD assets metadata)
# ============================================================
app.storage.provider=s3
app.storage.bucket=livraisons-proof
app.storage.endpoint=http://localhost:9000

# ============================================================
# ORACLE DATABASE (Historique & Archive)
# ============================================================
spring.oracle.datasource.jdbc-url=jdbc:oracle:thin:@localhost:1521:XE
spring.oracle.datasource.username=${ORACLE_USER:system}
spring.oracle.datasource.password=${ORACLE_PASSWORD:oracle}
spring.oracle.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Connection Pool Oracle
spring.oracle.datasource.hikari.pool-name=OracleHistoriquePool
spring.oracle.datasource.hikari.maximum-pool-size=5
spring.oracle.datasource.hikari.minimum-idle=2
spring.oracle.datasource.hikari.connection-timeout=30000
spring.oracle.datasource.hikari.idle-timeout=600000
spring.oracle.datasource.hikari.validation-timeout=5000
spring.oracle.datasource.hikari.connection-init-sql=ALTER SESSION SET CURRENT_SCHEMA=SYSTEM