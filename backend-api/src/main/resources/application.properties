# ============================================================
# APPLICATION CONFIGURATION - Supervision Livraisons API
# ============================================================

spring.application.name=supervision-livraisons-api
server.port=8080

# ============================================================
# POSTGRESQL DATABASE
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/livraisons_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# JWT CONFIGURATION
# ============================================================
app.jwt.secret=SuperSecretKeyForDeliverySupervision2026!ChangeInProduction
app.jwt.expiration=86400000

# ============================================================
# CORS (autoriser les requêtes Android/Emulateur)
# ============================================================
app.cors.allowed-origins=*

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# ============================================================
logging.level.com.supervision=DEBUG
logging.level.org.springframework.security=WARN
logging.file.name=logs/livraisons-api.log
